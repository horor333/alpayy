<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Payment Pino</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="watermark">ALL PAYMENT PINO</div>

    <div class="container">
        <div class="card">
            <div class="qris-section">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=ContohQRIS" alt="QRIS Logo" id="qris-img">
                <p>Scan untuk Pembayaran</p>
                <a href="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=ContohQRIS" download="QRIS_PINO.png" class="btn-download">Unduh Logo 🔥</a>
            </div>

            <hr class="divider">

            <div class="payment-details">
                <div class="payment-item">
                    <label>DANA</label>
                    <div class="copy-box">
                        <span id="dana-num">085864518943</span>
                        <button onclick="copyText('085864518943', 'btn-dana')">Salin</button>
                    </div>
                    <small>A.N. HERIS LIANA</small>
                </div>

                <div class="payment-item">
                    <label>SEABANK</label>
                    <div class="copy-box">
                        <span id="seabank-num">-</span>
                        <button onclick="copyText('-', 'btn-sea')">Salin</button>
                    </div>
                    <small>A.N. HERIS LIANA</small>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Berhasil disalin!</div>

    <script>
        function copyText(text, btnId) {
            navigator.clipboard.writeText(text);
            const toast = document.getElementById("toast");
            toast.classList.add("show");
            setTimeout(() => { toast.classList.remove("show"); }, 2000);
        }
    </script>
</body>
</html>
