<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Payment Pino | Payment Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <header class="watermark">
            <span class="badge">Official Payment</span>
            <h1>ALL PAYMENT PINO</h1>
        </header>

        <section class="qris-section">
            <div class="qris-wrapper">
                <img src="https://files.catbox.moe/n18w69.jpeg" alt="QRIS PINO" id="qris-image">
            </div>
            
            <a href="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=085864518943" download="QRIS_PINO.png" class="btn-download">
                Unduh QRIS 🔥
            </a>

            <p class="instruction">Scan QRIS untuk pembayaran cepat</p>
        </section>

        <div class="payment-grid">
            <div class="payment-card">
                <div class="details">
                    <span class="bank-name">DANA</span>
                    <span class="acc-number" id="dana-num">085864518943</span>
                    <span class="acc-name">A.N. HERIS LIANA</span>
                </div>
                <button class="copy-trigger" onclick="copyText('dana-num', this)">
                    Salin
                </button>
            </div>

            <div class="payment-card">
                <div class="details">
                    <span class="bank-name">SeaBank</span>
                    <span class="acc-number" id="seabank-num">-</span>
                    <span class="acc-name">A.N. -</span>
                </div>
                <button class="copy-trigger" style="opacity: 0.5; cursor: not-allowed;">
                    Salin
                </button>
            </div>
        </div>

        <footer class="footer">
            <p>© 2026 Payment Gateway by Pino</p>
        </footer>
    </div>

    <script>
        function copyText(id, btn) {
            const text = document.getElementById(id).innerText;
            if (text === "-") return; // Jangan salin jika kosong

            navigator.clipboard.writeText(text).then(() => {
                const originalText = "Salin";
                btn.innerText = "Berhasil Disalin!";
                btn.classList.add('success');
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.remove('success');
                }, 2000);
            });
        }
    </script>
</body>
</html>
